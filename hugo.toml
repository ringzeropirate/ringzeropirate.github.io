baseURL = "https://ringzeropirate.github.io/"
#languageCode = "it-IT"
title = "RingZero Pirate"
theme = "ringzero"
paginate = 10
enableRobotsTXT = true
enableEmoji = true
relativeURLs = false

# ── Multilingual ─────────────────────────
defaultContentLanguage = "it"
defaultContentLanguageInSubdir = false   # italiano alla root /

[languages]
  [languages.it]
    languageName = "IT"
    languageCode = "it-IT"
    contentDir   = "content/it"
    weight       = 1

  [languages.en]
    languageName = "EN"
    languageCode = "en-US"
    contentDir   = "content/en"
    weight       = 2
	
[params]
  description = "Ricerche offensive, kernel exploitation e difesa avanzata nel ring0 del sistema Linux."
  author = "RingZero Pirate"
  githubURL = "https://github.com/ringzeropirate/ringzeropirate.github.io/tree/main/scripts"
  year = "2026"
  subtitle = "// kernel.ring0 — root or nothing //"
  keywords = ["cybersecurity", "kernel", "linux", "exploitation", "eBPF", "offensive security"]

# Menu italiano
[[languages.it.menus.main]]
name   = "Articoli"
url    = "/articoli/"
weight = 1

[[languages.it.menus.main]]
name   = "GitHub"
url    = "https://github.com/ringzeropirate"
weight = 2
[languages.it.menus.main.params]
  external = true

# Menu inglese
[[languages.en.menus.main]]
name   = "Articles"
url    = "/en/articles/"
weight = 1

[[languages.en.menus.main]]
name   = "GitHub"
url    = "https://github.com/ringzeropirate"
weight = 2
[languages.en.menus.main.params]
  external = true
  
[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = true
    lineNumbersInTable = false
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]